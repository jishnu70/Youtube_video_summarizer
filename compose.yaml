services:
  server:
    build:
      context: .
      dockerfile: server.Dockerfile
    container_name: youtube_video_summarizer
    env_file: .env
    ports:
      - 8000:8000
    depends_on:
      - redis
      - celery_worker

  celery_worker:
    build:
      context: .
      dockerfile: worker.Dockerfile
    container_name: celery_youtube_video_summarizer
    env_file: .env
    volumes:
      - cache-volume:/opt/cache
    environment:
      - LT_DISABLE_DOWNLOAD=1
      - LANGUAGE_TOOL_HOME=/opt/cache/language_tool_python
      - WHISPER_CACHE_DIR=/opt/cache/whisper
      # Add your other environment variables here
    restart: unless-stopped

    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    container_name: redis_youtube_video_summarizer
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data

volumes:
  cache-volume:
    driver: local
